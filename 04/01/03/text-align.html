<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text-align</title>
    <style>
        h1{
            text-align: center;
        }
        h2{
            text-align: left;
        }
        h3{
            text-align: justify;
        }
        .father{
             text-align: center;
        }
    </style>
</head>
<body>
    <h1>这是一个标题</h1>
    <h2>这是一个标题</h1>
    <h3>这是一个标题</h1>
    <div class="father">
        <p>这是一个段落</p>
        <div class="son">这是一个孩子</div>
    </div>
</body>
</html>
