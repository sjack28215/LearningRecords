<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS元素选择器</title>
    <style>
        /* 元素选择器 */
        h2{
            color:red;
        }
        /* 类选择器 */
        .highlight{
            background-color: yellow;
        }
        /*  */
        h3{
            background-color: aqua;
        }
        /* id选择器 */
        #header{
            font-size: larger;
        }
        /* 通用选择器 */
        *{
            font-family: 'KaiTi';
        }
        /* 子元素选择器 */
        .father > .son{
            color:yellowgreen;
        }
        /* 后代选择器 */
        /* 后代包含子代 子代不包含后代 */
        /* Id 大于类 大于标签名 */
        .father p{
            color:red;
            font-size: larger;
        }
        /* 兄弟选择器 */
        h3+p{
            background-color: red;
        }

        /* 伪类选择器 */
        #element hover{
            background-color: blue;
        }
    </style>
</head>
<body>
    <h1>不同类型的css选择器</h1>
    <h2>这是一个元素选择器</h2>
    <h3 class="highlight">这是一个类选择器</h3>
    <h3>这是另一个类选择器</h3>
    <h4 id="header">这是一个id选择器</h4>
    <div class="father">
        <p class="son">你好</p>
        <div>
            <p class="grandson">
                这是一个后代选择器
            </p>
        </div>
    </div>
    <p>这是一个普通标签</p>
    <h3>这是一个相邻</h3>
    <h3 id="element">这是一个伪类选择器</h3>
</body>
</html>
