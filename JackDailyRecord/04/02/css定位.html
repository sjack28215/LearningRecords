<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            height: 350px;
            background-color: aqua;
        }
        .box-normal{
            width: 100px;
            height: 100px;
            background-color: purple;
        }
        .box-relative{
            width: 100px;
            height: 100px;
            background-color: pink;
            position: relative;
            left:20px;
            /* right:; */
            top:40px;
            /* bottom:; */

        }
        .box2{
            height: 350px;
            background-color: yellow;
            margin-bottom: 300px;
        }
        .box-absolute{
            width: 100px;
            height: 100px;
            background-color: yellowgreen;
            position: absolute;
            /* 相对定位的元素脱离了正常的文档流 */
            left:120px;
        }
        .box-fixed{
            height: 100px;
            width: 100px;
            background-color: black;
            position: fixed;
            right:0;
            top:300px;
        }
    </style>
</head>
<body>
    <header>
        前端测试页面
    </header>
    <h1>相对定位</h1>
    <div class="box1">
        <div class="box-normal"></div>
        <div class="box-relative"></div>
        <div class="box-normal"></div>
    </div>
    <h1>绝对定位</h1>
    <div class="box2">
        <div class="box-normal"></div>
        <div class="box-absolute"></div>
        <div class="box-normal"></div>
    </div>
    <h1>固定定位</h1>
    <!-- 相对于浏览器窗口进行定位的 -->
     <div class="box-fixed"></div>
</body>

</html>
